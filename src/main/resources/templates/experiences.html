<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Experiences - CSEA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div th:replace="~{base :: navbar}"></div>
<main class="container mx-auto px-6 py-12">
    <div class="flex flex-col items-center mb-12">
        <form action="/experiences" method="get" class="flex gap-4 mb-8 w-full max-w-lg">
            <input type="text" name="company" placeholder="Enter company name" class="flex-grow border border-gray-300 rounded px-4 py-2">
            <button type="submit" class="bg-gray-200 px-6 py-2 rounded">Search</button>
        </form>
        <div class="flex gap-4">
            <a href="/experiences" class="bg-teal-500 text-white px-8 py-2 rounded-full">All</a>
            <a href="/experiences?type=Placement" class="bg-white text-gray-600 px-8 py-2 rounded-full shadow border">Placement</a>
            <a href="/experiences?type=Intern" class="bg-white text-gray-600 px-8 py-2 rounded-full shadow border">Intern</a>
        </div>
    </div>

    <div th:if="${param.success}" class="bg-green-100 text-green-700 p-4 rounded mb-6 text-center">Successfully submitted!</div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div th:each="exp : ${experiences}" class="bg-gradient-to-br from-teal-400 to-blue-500 rounded-lg p-6 text-white shadow-lg h-48 flex flex-col justify-between">
            <div>
                <h2 class="text-2xl font-semibold mb-1" th:text="${exp.studentName}">Name</h2>
                <p class="text-teal-50 text-lg" th:text="${exp.companyName}">Company</p>
                <p class="text-teal-100 text-sm" th:text="${exp.yearOfPassing}">Year</p>
            </div>
            <div class="flex justify-between items-end mt-4">
                <a th:href="@{'/resume/' + ${exp.id}}" target="_blank" class="underline text-sm">Read Article</a>
                <span class="bg-white/20 px-3 py-1 rounded text-sm backdrop-blur-sm border border-white/30" th:text="${exp.placementType}">Type</span>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(experiences)}" class="col-span-3 text-center text-gray-500 py-10">
            No experiences found.
        </div>
    </div>
</main>
</body>
</html>
